name: Docker Build and Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Server Image
        uses: docker/build-push-action@v2
        with:
          context: ./broker
          file: ./broker/Dockerfile
          push: true
          tags: nycolasdelima/broker:latest

      - name: Build and Push Sensor Image
        uses: docker/build-push-action@v2
        with:
          context: ./sensor
          file: ./sensor/Dockerfile
          push: true
          tags: nycolasdelima/sensor:latest

      - name: Build and Push Atuador Image
        uses: docker/build-push-action@v2
        with:
          context: ./atuador
          file: ./atuador/Dockerfile
          push: true
          tags: nycolasdelima/atuador:latest

      - name: Build and Push Cliente Image
        uses: docker/build-push-action@v2
        with:
          context: ./cliente
          file: ./cliente/Dockerfile
          push: true
          tags: nycolasdelima/cliente:latest
